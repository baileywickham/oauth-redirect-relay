name: Publish

# Publishes to npm via OIDC trusted publishing (no NPM_TOKEN) when a v* tag is
# pushed, e.g. `git tag v0.1.1 && git push origin v0.1.1`. Can also be run
# manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC trusted publishing + provenance
      contents: read
    steps:
      - uses: actions/checkout@v5

      # bun runs the test/build gate (prepublishOnly: bun typecheck + test + build)
      - uses: oven-sh/setup-bun@v2

      # node performs the npm publish; registry-url wires up the OIDC auth
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      # trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      # prepublishOnly runs `bun run typecheck && bun test && bun run build`;
      # OIDC supplies short-lived credentials, so no token is needed.
      - run: npm publish
